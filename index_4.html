<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保護犬譲渡サイト：こうめ</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      font-family:sans-serif;
      background:#0f1e36;
      color:#f0f8ff;
    }
  </style>
</head>

<body class="min-h-screen py-20 px-8 md:px-16 flex flex-col items-center">

<div class="max-w-5xl w-full space-y-10">

    <!-- 写真（小：600px） -->
    <div class="w-full flex justify-center">
      <div class="w-[600px] bg-sky-950/50 p-4 rounded-3xl border-2 border-sky-800/80 shadow-2xl">
        <div class="rounded-2xl overflow-hidden w-full h-[600px] bg-sky-900/30">
          <img
            src="dog_4.jpg"
            alt="こうめ"
            class="w-full h-full object-cover"
          />
        </div>
        <p class="text-center text-sm text-sky-400 mt-3">
          こうめくんの日常写真（dog_4.jpg）
        </p>
      </div>
    </div>
  <!-- 名前（下・大） -->
    <header class="text-center">
      <h1 class="text-[110px] md:text-[170px] font-bold tracking-wider text-sky-200 leading-none">
        こうめ
      </h1>
    </header>
    <!-- 2. 年齢・性別 -->
    <div class="border border-sky-800 bg-sky-950/60 p-5 rounded-2xl text-center space-y-1">
      <p class="text-sky-300 text-xs">プロフィール</p>
      <div class="text-2xl font-bold tracking-widest text-white flex justify-center gap-6">
        <span>年齢：3歳</span>
        <span>性別：男の子</span>
      </div>
    </div>
    <!-- 紹介文（下） -->
    <div class="bg-sky-950/40 p-6 md:p-8 rounded-2xl border border-sky-800/80 space-y-4">
      <h2 class="text-xl font-bold text-sky-200 border-b border-sky-800 pb-2">
        紹介文
      </h2>
      <p class="leading-loose text-base md:text-lg whitespace-pre-line text-sky-100">
ボール遊びとヨーグルトが大好きです。
初めて会う人には少し緊張しますが、慣れるとしっぽを振って近寄ってきます。
散歩が大好きで、公園では元気いっぱい走ります。
優しく接してくださる家族との出会いを待っています。
      </p>
    </div>
   
    <!-- 保護理由 -->
    <div class="bg-sky-950/40 p-6 md:p-8 rounded-2xl border border-sky-800/80 space-y-3">
      <h2 class="text-xl font-bold text-sky-200 border-b border-sky-800 pb-2">
        保護された理由
      </h2>
      <p class="leading-relaxed text-base md:text-lg text-sky-100">
        飼い主の病気により飼育が継続できなくなり保護されました。
      </p>
    </div>



    <!-- ボタン -->
    <div class="text-center pt-4">
      <button
        onclick="alert('お気軽にお問い合わせください。スタッフがご案内いたします。🐾')"
        class="inline-flex items-center justify-center bg-sky-600 hover:bg-sky-500 active:bg-sky-700 text-white font-bold px-12 py-4 rounded-full shadow-lg transition duration-200 text-lg border border-sky-400 w-full md:w-auto">
        この子に会ってみる
      </button>
    </div>

</div>

</body>
</html>
